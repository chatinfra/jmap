$schema: https://json-schema.org/draft/2020-12/schema
type: object
required: [tool, schemas]
additionalProperties: false
properties:
  tool: {const: jmap}
  schemas:
    type: array
    minItems: 1
    items:
      type: object
      required: [id, path]
      additionalProperties: false
      properties:
        id: {type: string, minLength: 1}
        path:
          type: string
          pattern: '^spec/outputs/.+\.schema\.yaml$'
